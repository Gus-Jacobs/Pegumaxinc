{% extends "base.html" %}
{% block title %}Sign up — Pegumax Inc.{% endblock %}

{% block content %}
<section class="sec" style="padding-top:9rem;">
  <div class="wrap">
    <div class="sec-head reveal" style="margin-bottom:2rem;">
      <span class="eyebrow c">// join pegumax</span>
      <h2>Create your <span class="g">account</span></h2>
    </div>
    <div class="form-card reveal-s">
      <form method="post" action="{% url 'main_site:signup' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-acc btn-lg" type="submit" style="margin-top:.6rem;justify-content:center;">Create account</button>
      </form>
      <div class="swap" style="text-align:center;margin-top:1.2rem;color:var(--mut);font-size:.9rem;">
        Already have an account? <a href="{% url 'login' %}" style="color:var(--cy);font-weight:600;">Log in</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
