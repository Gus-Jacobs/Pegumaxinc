<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;background:#0a0a12;font-family:'Segoe UI',Arial,sans-serif;color:#e8e9f3;">
  <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
    <div style="background:#11111b;border:1px solid rgba(54,224,160,.4);border-radius:16px;padding:32px;">
      <div style="font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#36e0a0;">Pegumax Academy</div>
      <h1 style="font-size:25px;margin:10px 0 6px;color:#fff;">🎓 Congratulations!</h1>
      <p style="color:#b8bbd4;line-height:1.6;">You passed <strong style="color:#fff;">{{ course_title }}</strong> with a
        <strong style="color:#36e0a0;">{{ score }}%</strong> aggregate score. Outstanding work.</p>

      <p style="text-align:center;margin:26px 0 10px;">
        <a href="{{ certificate_url }}" style="background:linear-gradient(120deg,#7c5cff,#22d3ee);color:#0a0a12;text-decoration:none;font-weight:700;padding:14px 28px;border-radius:10px;display:inline-block;">View your certificate →</a>
      </p>

      <div style="background:rgba(54,224,160,.1);border:1px dashed rgba(54,224,160,.5);border-radius:12px;padding:18px;margin:24px 0;text-align:center;">
        <div style="color:#b8bbd4;font-size:14px;">Your reward — <strong style="color:#36e0a0;">{{ discount }}% off any item</strong></div>
        <div style="font-family:monospace;font-size:22px;font-weight:800;color:#36e0a0;letter-spacing:.06em;margin:8px 0;">{{ promo_code }}</div>
        <a href="{{ store_url }}" style="color:#22d3ee;text-decoration:none;font-weight:600;">Redeem it in the store →</a>
      </div>

      <p style="color:#777a96;font-size:13px;margin-top:24px;">Keep building,<br>The Pegumax Team</p>
    </div>
    <p style="text-align:center;color:#55586f;font-size:12px;margin-top:16px;">© Pegumax LLC</p>
  </div>
</body>
</html>
